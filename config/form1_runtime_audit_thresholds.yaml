schema_version: form1_runtime_audit_thresholds.v1
created_at: "2026-05-19T14:10:00Z"
thresholds:
  px4_gazebo_wind_trajectory_delta:
    condition_kind: wind_speed_drone_behavior_delta
    baseline_wind_mps: 0.0
    condition_wind_mps: 4.0
    wind_direction_deg: 90.0
    observed_delta_metric: max_observed_delta_m
    minimum_observed_delta_m: 0.25
    form1a_margin_ratio: 2.0
    form2a_improvement_gate:
      ratio: 0.9243093071846399
      noise_floor_source: artifacts/sitl_noise_characterization/wind_audit_noise_floor_20260519T164028Z.v1.json
      noise_floor_source_sha256: a97d35b1602515b2063741d72500f733e5787e32ecf2fc20427ae7299deb523f
      sample_count: 5
      noise_fraction_95: 0.07569069281536007
      rationale: >
        Derived from #774 live PX4/Gazebo SITL noise characterization with
        five supported wind-audit samples. The post-action max trajectory
        delta must be at most this ratio times the pre-action max trajectory
        delta to count as measurable improvement beyond repeatability
        variation.
    rationale: >
      The threshold must be set before the runtime audit result exists. A
      0.25 m Gazebo-local trajectory delta is above pose-sample jitter used by
      the existing wind trajectory audit while staying small enough for a
      bounded SITL-only smoke run to expose a condition-driven route delta.
boundaries:
  sitl_only: true
  physical_execution_invoked: false
  hardware_target_allowed: false
  delivery_completion_claimed: false
  public_sync: false
